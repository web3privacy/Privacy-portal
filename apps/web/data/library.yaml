# Library - Key Documents, Important Articles, Books
# Data from https://academy.web3privacy.info/p/library

keyDocuments:
  - title: "The Crypto Anarchist Manifesto"
    author: "Timothy May"
    year: 1988
    description: "The Manifesto envisions a future where individuals can communicate and conduct transactions anonymously, outside the control of governments and centralized institutions."
    url: "https://nakamotoinstitute.org/library/crypto-anarchist-manifesto/"

  - title: "The Cypherpunk Manifesto"
    author: "Eric Hughes"
    year: 1993
    description: "The Manifesto advocates for privacy in the digital age, distinguishing it from secrecy. It emphasizes using cryptography and anonymous systems to protect privacy."
    url: "https://www.activism.net/cypherpunk/manifesto.html"

  - title: "Crypto Anarchy and Virtual Communities"
    author: "Timothy C. May"
    year: 1994
    description: "The essay argues that strong cryptography and virtual networks will transform economic and social systems, enabling untraceable communications and decentralized finance."
    url: "https://nakamotoinstitute.org/library/virtual-communities/"

  - title: "The Cyphernomicon"
    author: "Timothy C. May"
    year: 1994
    description: "An extensive FAQ and philosophical document by Tim May that outlines the principles, goals, and technological foundations of the Cypherpunk movement."
    url: "https://hackmd.io/@jmsjsph/TheCyphernomicon"

  - title: "Declaration of independence of cyberspace"
    author: "John Perry Barlow"
    year: 1996
    description: "The co-founder of the Electronic Frontier Foundation argues that governments have no authority in the digital realm."
    url: "https://www.eff.org/it/cyberspace-independence"

importantArticles:
  - title: "A Political History of DAOs"
    author: "Kelsie Nabben"
    year: 2022
    description: "The article explores the Cypherpunks Mailing List, a 1990s forum that influenced the development of cryptocurrencies and decentralized technologies."
    url: "https://www.fwb.help/editorial/cypherpunks-to-social-daos"

  - title: "The Core of Crypto is Punks and Principles"
    author: "Piergiorgio Catti De Gasperi"
    year: 2023
    description: "Examines how privacy-focused intellectuals, the Cypherpunks, pioneered the foundation for Web3."
    url: "https://mirror.xyz/yarak.eth/Mj6cCdR74K96AIrz3RTgANCB1L3W9jGvCwJYVO1wCfE"

  - title: "Make Ethereum Cypherpunk Again"
    author: "Vitalik Buterin"
    year: 2023
    description: "Ethereum co-founder calls for a return to the cypherpunk ideals of a decentralized and open crypto ecosystem."
    url: "https://vitalik.eth.limo/general/2023/12/28/cypherpunk.html"

  - title: "Make Public Policy Cypherpunk Again"
    author: "Peter Van Valkenburgh"
    year: 2024
    description: "Director of Research at Coin Center reflects on the state of the crypto and Cypherpunk movements."
    url: "https://www.youtube.com/watch?v=Q2KfNDqj9Vo"


# Footer configuration (4 columns + social). Overrides defaultContent.footer when this file is loaded.
# Logo path (optional)
logo: /assets/nav-logo.svg

# Four columns of links. Each column is a list of links: { label, href, external?: true }
linksColumns:
  - - { label: Manifesto, href: '#manifesto' }
    - { label: How to get involved, href: '#support' }
    - { label: Grants / Support Us, href: '#support' }
  - - { label: Events, href: '/events' }
    - { label: Articles, href: '/resources' }
    - { label: Talks, href: '#' }
  - - { label: Privacy Explorer, href: 'https://explorer.web3privacy.com', external: true }

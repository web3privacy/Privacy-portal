# Awards base data
# User-editable data goes to awards-user.yaml

years:
  - year: 2024
    title: "Privacy Awards 2024"
    description: "Annual community driven awards given to the best and the worst within the privacy ecosystem"
    heroBackgroundImage: "/images/bg-awards.png"
    dates:
      nominationsOpen: "2024-12-03"
      nominationsClose: "2024-12-26"
      announcement: "2025-01-19"
    categories:
      - id: favourite-privacy-project
        name: "Favourite Privacy Project"
        description: "The best privacy-focused projects of the year"
        maxNominations: 3
      - id: exciting-innovation
        name: "Exciting Innovation"
        description: "Most exciting innovations supporting privacy"
        maxNominations: 2
      - id: major-news-event
        name: "Major News / Event"
        description: "Key events and news regarding privacy"
        maxNominations: 1
      - id: doxxer-of-year
        name: "Doxxer of the Year"
        description: "For encouraging to use non-private channels"
        maxNominations: 1
    winners:
      - category: favourite-privacy-project
        winner: "Brave"
        description: "Privacy-focused browser"
        icon: "/images/awards/brave.png"
        url: "https://brave.com"
      - category: exciting-innovation
        winner: "Full-Chain Membership Proofs++ for Monero"
        description: "Advanced privacy technology"
        icon: "/images/awards/monero.png"
      - category: exciting-innovation
        winner: "Privacy Pools"
        description: "Privacy-preserving pools"
        icon: "/images/awards/privacy-pools.png"
      - category: exciting-innovation
        winner: "Railway"
        description: "Privacy infrastructure"
        icon: "/images/awards/railway.png"
      - category: major-news-event
        winner: "Tornado Cash positive ruling"
        description: "Important legal development"
        icon: "/images/awards/tornado-cash.png"
      - category: doxxer-of-year
        winner: "Tornado Cash positive ruling"
        description: "For encouraging to use non private channels"
        icon: "/images/awards/doxxer.png"
    nominations: []
    rules: |
      Any person can Nominate a candidate for any of the 4 categories of Awards this year, by answering the following questions:
      
      1. Favourite PRO-PRIVACY project/product of 2024? (3 names / each)
      2. Major news regarding privacy in 2024? (2 names / each)
      3. Key event regarding privacy in 2024? (1 each)
      4. Most exciting innovation supporting privacy? (2 names / each)
      5. Doxxer of the year (1 each)
      
      Note: if you are affiliated with a privacy project (work or invest in them) please name a different one, this will reduce the bias in our nominations and make the Awards better overall. We respect anonymity and privacy, we welcome submissions from all users including from anon/pseudonymous ones.
    howToNominate: |
      It is very easy to submit your nominations and your choices matter to the Awards - any person can submit a nomination (no vetting) Write out your nominations by answering each of the 4 questions:
      
      + Send a DM via X / Twitter to the web3privacy profile
      + Join our Telegram community and share it there with our community
      + Email us web3privacynow@protonmail.com
      
      Note: if you are affiliated with a privacy project (work or invest in them) please name a different one, this will reduce the bias in our nominations and make the Awards better overall. We respect anonymity and privacy, we welcome submissions from all users including from anon/pseudonymous ones.


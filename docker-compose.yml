services:
  privacy-stacks:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: privacy-stacks
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/data:/app/data
      - ./apps/web/data.yaml:/app/data.yaml
